<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <input type="text" v-model="task" placeholder="Enter a task" />
        <button @click="addTask(task)">Add Task</button>
        <button @click="printTasks()">Print Tasks</button>
        <button @click="clearTasks()">Clear all Tasks</button>
       <div> <p>{{ message }}</p></div>
       <br>
    </div>

    <script src="index.js">  </script>
</body>
</html>
