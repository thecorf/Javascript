<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <input type="text" v-model="word" placeholder="Enter a word" />
        <button @click="addWord(word)">Add Word</button>
        <button @click="printWords()">Print Words</button>
        <button @click="clearwords()">Clear Words</button>
        <p>{{ message }}</p>
    </div>

    <script src="index.js">  </script>
</body>
</html>
